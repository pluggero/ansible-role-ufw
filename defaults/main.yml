---
# Installation
ufw_install_method: "package"

# Service control
ufw_enabled: true

# Logging — off | low | medium | high | full
ufw_logging: "low"

# Config file management — set to true to manage /etc/default/ufw
ufw_manage_config: false
ufw_config:
  IPV6: "yes"
  DEFAULT_INPUT_POLICY: "DROP"
  DEFAULT_OUTPUT_POLICY: "ACCEPT"
  DEFAULT_FORWARD_POLICY: "DROP"
  DEFAULT_APPLICATION_POLICY: "SKIP"

# Rules — list of rule dicts; only 'rule' is required
ufw_rules:
  - rule: allow
    to_port: "22"
    proto: tcp
    comment: "Allow SSH"
# Full schema (all keys optional except 'rule'):
# - rule: allow          # allow | deny | reject | limit
#   to_port: "22"        # destination port
#   from_port: ""        # source port
#   proto: tcp           # tcp | udp | any
#   from_ip: "any"       # source IP/CIDR
#   to_ip: "any"         # destination IP/CIDR
#   interface: ""        # network interface name
#   direction: "in"      # in | out | routed
#   log: false           # boolean — log matched packets
#   comment: ""          # rule description
#   route: false         # boolean — routed/forwarded traffic
#   insert: ""           # insert at position (integer)
#   delete: false        # boolean — delete this rule
