---
- name: Verify
  hosts: all
  gather_facts: true

  vars_files:
    - ../../defaults/main.yml
    - ../../vars/molecule.yml

  vars:
    ansible_user: ansible
    ansible_become_password: ansible

  tasks:
    - name: Get ufw binary path
      ansible.builtin.command:
        cmd: which ufw
      register: ufw_which
      changed_when: false
      become: true

    - name: Assert ufw binary exists
      ansible.builtin.assert:
        that:
          - ufw_which.rc == 0
        fail_msg: "ufw binary not found via 'which ufw'"

    - name: Get ufw version
      ansible.builtin.command:
        cmd: ufw version
      register: ufw_version_output
      changed_when: false
      become: true

    - name: Assert ufw version command succeeded
      ansible.builtin.assert:
        that:
          - ufw_version_output.rc == 0
        fail_msg: "ufw version command failed"

    - name: Get ufw status
      ansible.builtin.command:
        cmd: ufw status verbose
      register: ufw_status
      changed_when: false
      become: true

    - name: Assert ufw is active
      ansible.builtin.assert:
        that:
          - "'Status: active' in ufw_status.stdout"
        fail_msg: "ufw is not active — expected it to be enabled"
      when: ufw_enabled

    - name: Assert ufw is inactive
      ansible.builtin.assert:
        that:
          - "'Status: inactive' in ufw_status.stdout"
        fail_msg: "ufw is active — expected it to be disabled"
      when: not ufw_enabled

    - name: Query ufw.service systemd state
      ansible.builtin.systemd:
        name: ufw.service
      register: ufw_service_status
      become: true

    - name: Assert ufw.service is enabled and active
      ansible.builtin.assert:
        that:
          - ufw_service_status.status.ActiveState == "active"
          - ufw_service_status.status.UnitFileState == "enabled"
        fail_msg: "ufw.service is not enabled+active via systemd — expected enabled/active when ufw_enabled=true"
      when: ufw_enabled

    - name: Assert ufw.service is disabled and inactive
      ansible.builtin.assert:
        that:
          - ufw_service_status.status.ActiveState != "active"
          - ufw_service_status.status.UnitFileState == "disabled"
        fail_msg: "ufw.service is not disabled+inactive via systemd — expected disabled/inactive when ufw_enabled=false"
      when: not ufw_enabled

    - name: Get ufw numbered rules
      ansible.builtin.command:
        cmd: ufw status numbered
      register: ufw_rules_output
      changed_when: false
      become: true

    - name: Assert SSH allow rule is present
      ansible.builtin.assert:
        that:
          - "'22/tcp' in ufw_rules_output.stdout"
        fail_msg: "SSH allow rule (port 22/tcp) not found in ufw status"

    - name: Check /etc/default/ufw exists
      ansible.builtin.stat:
        path: /etc/default/ufw
      register: ufw_config_stat
      when: ufw_manage_config

    - name: Assert /etc/default/ufw exists with correct mode
      ansible.builtin.assert:
        that:
          - ufw_config_stat.stat.exists
          - ufw_config_stat.stat.mode == "0644"
        fail_msg: "/etc/default/ufw not found or wrong permissions"
      when: ufw_manage_config

    - name: Read /etc/default/ufw content
      ansible.builtin.slurp:
        src: /etc/default/ufw
      register: ufw_config_content
      when: ufw_manage_config

    - name: Assert DEFAULT_INPUT_POLICY is configured correctly
      ansible.builtin.assert:
        that:
          - "('DEFAULT_INPUT_POLICY=\"' + ufw_config.DEFAULT_INPUT_POLICY + '\"') in (ufw_config_content.content | b64decode)"
        fail_msg: "DEFAULT_INPUT_POLICY not set correctly in /etc/default/ufw"
      when: ufw_manage_config

    - name: Read /etc/ufw/before.rules content
      ansible.builtin.slurp:
        src: /etc/ufw/before.rules
      register: ufw_before_rules_content
      become: true
      when: ufw_nat_rules | selectattr('ip_version', 'equalto', 4) | list | length > 0

    - name: Assert IPv4 NAT block is present in /etc/ufw/before.rules
      ansible.builtin.assert:
        that:
          - "'BEGIN ANSIBLE MANAGED NAT RULES' in (ufw_before_rules_content.content | b64decode)"
          - "'-A POSTROUTING' in (ufw_before_rules_content.content | b64decode)"
          - "'MASQUERADE' in (ufw_before_rules_content.content | b64decode)"
        fail_msg: "IPv4 NAT block not found in /etc/ufw/before.rules"
      when: ufw_nat_rules | selectattr('ip_version', 'equalto', 4) | list | length > 0

    - name: Read /etc/ufw/before6.rules content
      ansible.builtin.slurp:
        src: /etc/ufw/before6.rules
      register: ufw_before6_rules_content
      become: true
      when: ufw_nat_rules | selectattr('ip_version', 'equalto', 6) | list | length > 0

    - name: Assert IPv6 NAT block is present in /etc/ufw/before6.rules
      ansible.builtin.assert:
        that:
          - "'BEGIN ANSIBLE MANAGED NAT RULES' in (ufw_before6_rules_content.content | b64decode)"
          - "'-A POSTROUTING' in (ufw_before6_rules_content.content | b64decode)"
          - "'MASQUERADE' in (ufw_before6_rules_content.content | b64decode)"
        fail_msg: "IPv6 NAT block not found in /etc/ufw/before6.rules"
      when: ufw_nat_rules | selectattr('ip_version', 'equalto', 6) | list | length > 0
