---
# Molecule test variables — override defaults for comprehensive testing

ufw_enabled: true
ufw_logging: "low"
ufw_manage_config: true

ufw_config:
  IPV6: "yes"
  DEFAULT_INPUT_POLICY: "DROP"
  DEFAULT_OUTPUT_POLICY: "ACCEPT"
  DEFAULT_FORWARD_POLICY: "DROP"
  DEFAULT_APPLICATION_POLICY: "SKIP"

ufw_rules:
  - rule: allow
    to_port: "22"
    proto: tcp
    comment: "Allow SSH"
  - rule: allow
    to_port: "80"
    proto: tcp
    comment: "Allow HTTP"
  - rule: allow
    to_port: "443"
    proto: tcp
    comment: "Allow HTTPS"

ufw_nat_rules:
  - chain: POSTROUTING
    jump: MASQUERADE
    out_interface: eth0
    source: "10.200.200.0/24"
    ip_version: 4
    comment: "Masquerade LAN traffic"
  - chain: POSTROUTING
    jump: MASQUERADE
    out_interface: eth0
    source: "fd00::/64"
    ip_version: 6
    comment: "Masquerade IPv6 LAN traffic"
